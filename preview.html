<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockClub — Preview</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="builder.css" />
    <style>
      .topbar .top-actions { gap: 8px; }
      .preview-shell { padding: 18px 0 30px; }

      .preview-stage {
        width: min(984px, calc(100vw - 60px));
        margin: 0 auto;
      }

      .preview-note {
        color: var(--muted);
        font-weight: 800;
        font-size: 13px;
        margin: 10px 0 14px;
      }
      .preview-page-tabs {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        flex-wrap: wrap;
        margin: 0 0 -1px;
        padding: 0 8px;
        position: relative;
        z-index: 5;
      }

      .preview-page-tab {
        border: 1px solid var(--theme-border, rgba(226, 232, 240, 0.9));
        border-bottom: 0;
        background: rgba(255, 255, 255, 0.88);
        color: var(--theme-text, var(--text));
        border-radius: 14px 14px 0 0;
        padding: 10px 16px 12px;
        font-weight: 950;
        cursor: pointer;
        box-shadow: 0 -4px 16px rgba(15, 23, 42, 0.08);
        transform: translateY(1px);
      }

      .preview-page-tab:hover {
        background: #ffffff;
        border-color: var(--theme-accent, #6366f1);
      }

      .preview-page-tab.active {
        background: var(--theme-surface-2, #ffffff);
        color: var(--theme-accent, #6366f1);
        border-color: var(--theme-accent, #6366f1);
        padding-top: 14px;
        transform: translateY(0);
      }

      .preview-canvas {
        position: relative;
        width: 100%;
        min-height: 900px;
        border-radius: var(--soft);
        border: 1px solid rgba(226, 232, 240, 0.9);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .pv-block {
        position: absolute;
        border-radius: 16px;
        border: 1px solid rgba(226, 232, 240, 0.95);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 26px rgba(2, 6, 23, 0.10);
        overflow: hidden;
      }

      .pv-body {
        position: absolute;
        left: 0;
        right: 0;
        top: 34px;
        bottom: 0;
        padding: 12px;
      }
      .pv-block::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 34px;
        height: 1px;
        background: rgba(226, 232, 240, 0.95);
      }
      .pv-text {
        width: 100%;
        height: 100%;
        overflow: auto;
        line-height: 1.55;
        font-size: 14px;
        color: var(--text);
        white-space: pre-wrap;
      }

      .pv-text div,
      .pv-text p {
        margin: 0;
        min-height: 1.55em;
      }

      .pv-text div:empty::before,
      .pv-text p:empty::before {
        content: "\00a0";
      }

      .pv-text br {
        display: block;
      }

      .pv-image {
        width: 100%;
        height: 100%;
        border-radius: 14px;
        background-size: cover;
        background-position: center;
        border: 1px solid rgba(226,232,240,0.9);
      }

      .pv-vote {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        font-weight: 950;
        text-decoration: none;
        background: linear-gradient(180deg, rgba(34,197,94,0.95), rgba(34,197,94,0.75));
        color: #05120a;
        border: 1px solid rgba(255,255,255,0.18);
        box-shadow: 0 10px 30px rgba(34,197,94,0.18);
      }

      .pv-deco {
        position: absolute;
        user-select: none;
        pointer-events: none;
        transform-origin: center;
      }
    </style>
  </head>

  <body data-theme="royal">
    <div class="topbar">
      <div class="wrap topbar-inner">
        <div class="brand">
          <img class="logo-mark" src="android-chrome-192x192.png" alt="BlockClub logo">
          <div class="logo-text">BlockClub</div>
          <div class="muted" style="margin-left: 10px; font-weight: 800;">Preview</div>
        </div>

        <div class="top-actions">
          <button class="btn small ghost" id="closeBtn" type="button">Close preview</button>
        </div>
      </div>
    </div>

    <main class="preview-shell">
      <div class="preview-stage wrap">
        <div class="preview-note" id="note"></div>
        <div id="previewPageTabs" class="preview-page-tabs"></div>
        <div id="canvas" class="preview-canvas" aria-label="Preview canvas"></div>
      </div>
    </main>

    <script src="preview.js"></script>
  </body>
</html>
